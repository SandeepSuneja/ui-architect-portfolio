<html lang="en">
<head>
<meta charset="utf-8" />

<title>Sandeep Suneja — Frontend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #07090c;
    --bg-2: #0b0f15;
    --ink: #e8edf2;
    --ink-dim: #93a1b1;
    --ink-mute: #5b6776;
    --line: rgba(255,255,255,.08);
    --line-2: rgba(255,255,255,.14);
    --accent: #5cf2c2;
    --accent-2: #7cb6ff;
    --accent-warm: #ffb38a;
    --grid: rgba(120,150,180,.08);
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --font-serif: "Instrument Serif", Georgia, serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:var(--font-display); font-feature-settings:"ss01","ss02";
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, color-mix(in oklab, var(--accent) 12%, transparent), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, color-mix(in oklab, var(--accent-2) 10%, transparent), transparent 60%),
      var(--bg);
    min-height:100vh;
  }
  ::selection{background:color-mix(in oklab, var(--accent) 35%, transparent); color:var(--ink)}

  /* ─ Grid backdrop ───────────────────────────────────────── */
  .grid-bg{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }

  /* ─ Top nav ─────────────────────────────────────────────── */
  .nav{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px;
    background:linear-gradient(180deg, rgba(7,9,12,.8), rgba(7,9,12,0));
    backdrop-filter:blur(8px);
  }
  .nav .brand{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-mono); font-size:13px; letter-spacing:.02em;
    color:var(--ink);
  }
  .nav .brand .dot{
    width:8px; height:8px; border-radius:2px; background:var(--accent);
    box-shadow: 0 0 12px color-mix(in oklab, var(--accent) 70%, transparent);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.55; transform:scale(.85)} }
  .nav ul{ display:flex; gap:28px; list-style:none; padding:0; margin:0; font-family:var(--font-mono); font-size:12px}
  .nav ul a{ color:var(--ink-dim); text-decoration:none; transition:color .2s}
  .nav ul a:hover{ color:var(--accent) }
  .nav .cta{
    font-family:var(--font-mono); font-size:12px;
    padding:8px 14px; border:1px solid var(--line-2); border-radius:8px;
    color:var(--ink); text-decoration:none; transition:.2s;
  }
  .nav .cta:hover{ border-color:var(--accent); color:var(--accent) }

  /* ─ Section frame ───────────────────────────────────────── */
  section{ position:relative; z-index:1; padding:120px 32px; max-width:1320px; margin:0 auto }
  .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:10px;
  }
  .eyebrow::before{ content:""; width:24px; height:1px; background:var(--accent); display:inline-block }
  h1,h2,h3{ font-weight:500; letter-spacing:-0.02em; margin:0 }
  h1{ font-size: clamp(48px, 7.6vw, 116px); line-height:.96 }
  h2{ font-size: clamp(36px, 4.4vw, 64px); line-height:1.04 }
  h3{ font-size: 22px; line-height:1.2 }

  /* Reveal on scroll */
  .reveal{ opacity:0; transform: translateY(24px); transition: opacity .9s ease, transform .9s ease }
  .reveal.in{ opacity:1; transform:none }

  /* Scrollbar */
  ::-webkit-scrollbar{ width:10px; height:10px }
  ::-webkit-scrollbar-track{ background:transparent }
  ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.06); border-radius:8px }
  ::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.12) }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" src="about.jsx"></script>

</body>
</html>
